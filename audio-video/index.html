<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio/Video Demo</title>
  </head>
  <body>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-minimal.js"
    ></script>

    <video-player>
      <video-minimal-skin>
        <video
          src="assets/resources/hudson-shelter-falls.mp4"
          playsinline
        ></video>
      </video-minimal-skin>
    </video-player>
    <br>
    <audio controls="controls">
      <source src="assets/resources/thunder.ogg" type="audio/ogg" />
      <source src="assets/resources/thunder.mp3" type="audio/mp3" />
      <source src="assets/resources/thunder.wav" type="audio/wav" />
      <a href="thunder.mp3">Download the Audio</a>
    </audio>
  </body>
</html>
